name: Publish

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build DS package
        run: pnpm --filter @aleph-front-bkp/ds build

      - name: Verify package
        working-directory: packages/ds
        run: pnpm check:package

      - name: Debug auth state
        run: |
          echo "--- npm version ---"
          npm -v
          echo "--- node version ---"
          node -v
          echo "--- npm config list ---"
          npm config list
          echo "--- npmrc files ---"
          cat ~/.npmrc 2>/dev/null || echo "no ~/.npmrc"
          cat .npmrc 2>/dev/null || echo "no ./.npmrc"
          echo "--- NODE_AUTH_TOKEN set? ---"
          if [ -z "${NODE_AUTH_TOKEN+x}" ]; then echo "NOT SET"; else echo "SET (length: ${#NODE_AUTH_TOKEN})"; fi

      - name: Publish to npm
        working-directory: packages/ds
        run: npm publish --access public --verbose
